name: Deploy Vite to Cloudflare Pages

on:
    push:
        branches:
            - main

jobs:
    deploy:
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v4

            - uses: actions/setup-node@v4
              with:
                  node-version: 20

            - run: npm install
            - run: npm run build

            - name: Debug API Token
              run: |
                  echo "Account ID length: ${#CLOUDFLARE_ACCOUNT_ID}"
                  echo "API Token length: ${#CLOUDFLARE_API_TOKEN}"
                  echo "API Token starts with: ${CLOUDFLARE_API_TOKEN:0:8}..."
              env:
                  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
                  CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

            - name: Publish to Cloudflare Pages
              uses: cloudflare/pages-action@v1
              with:
                  apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
                  accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
                  projectName: cold-band-8c50
                  directory: dist
                  gitHubToken: ${{ secrets.GITHUB_TOKEN }}
